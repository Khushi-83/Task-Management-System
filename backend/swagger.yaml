openapi: 3.0.0
info:
  title: Task Management API
  description: Robust RESTful API for Enterprise Task Management
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        '201':
          description: Created
          
  /auth/login:
    post:
      summary: Authenticate user & get tokens
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Success
          
  /auth/refresh:
    post:
      summary: Refresh JWT access token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Success

  /tasks:
    get:
      summary: Get user tasks with pagination and filters
      tags: [Tasks]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
      responses:
        '200':
          description: Success
    post:
      summary: Create a new task
      tags: [Tasks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [Pending, Completed, Archived] }
                priority: { type: string, enum: [Low, Medium, High] }
      responses:
        '201':
          description: Created

  /analytics/dashboard:
    get:
      summary: Get complex productivity analytics
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
